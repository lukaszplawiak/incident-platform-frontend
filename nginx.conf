##############################################################
# nginx.conf — production configuration for Angular SPA
#
# Usage:
#   ng build --configuration production
#   docker build -t incident-platform-frontend .
#   docker run -p 80:80 incident-platform-frontend
#
# Security headers implemented here (not in index.html):
# - Strict-Transport-Security (HSTS) — enforces HTTPS
# - X-Content-Type-Options — prevents MIME sniffing
# - X-Frame-Options — Clickjacking protection
# - Referrer-Policy — controls Referer header leakage
# - Permissions-Policy — disables unused browser APIs
# - Content-Security-Policy — replaces meta tag from index.html
#
# NOTE: HTTP header CSP takes precedence over meta tag CSP.
# When served by Nginx, the meta tag in index.html is ignored
# in favour of the HTTP header — this is expected behaviour.
# Keep both in sync when making changes.
##############################################################

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ================================================================
    # Gzip compression — reduces transfer size
    # ================================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ================================================================
    # Security Headers
    # ================================================================

    # HSTS — enforces HTTPS for 1 year
    # NOTE: Enable only when you have a valid SSL certificate.
    # Leave commented out for local HTTP environments.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Prevents MIME type sniffing — browser will not guess file type
    # e.g. a .txt file will not be executed as JavaScript
    add_header X-Content-Type-Options "nosniff" always;

    # Clickjacking protection — forbids embedding in iframes
    # Duplicates frame-ancestors from CSP — fallback for older browsers
    add_header X-Frame-Options "DENY" always;

    # Referrer Policy — when navigating to external sites,
    # browser sends only origin (not full URL path)
    # Prevents leaking internal URL paths to third-party services
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy — disables browser APIs we do not use
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ================================================================
    # Content-Security-Policy
    #
    # Changes vs previous version:
    # - Removed font-src https://fonts.gstatic.com — Google Fonts removed
    # - Removed style-src https://fonts.googleapis.com — not needed
    # - Added http://localhost:8081 to connect-src — ingestion-service
    #   was missing here but present in index.html meta tag (now aligned)
    # - Added https/wss variants for all localhost ports
    #
    # TODO before production deploy:
    # - Replace all localhost URLs with production API domains
    # - Enable HSTS above after obtaining SSL certificate
    # - Consider nonce-based script-src for stronger XSS protection
    # ================================================================
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline';
        connect-src 'self'
            http://localhost:8081
            http://localhost:8082
            ws://localhost:8082
            https://localhost:8081
            https://localhost:8082
            wss://localhost:8082;
        font-src 'self';
        img-src 'self' data:;
        frame-ancestors 'none';
        object-src 'none';
        base-uri 'self';
    " always;

    # ================================================================
    # Angular SPA routing — all routes handled by index.html
    #
    # Without this — refreshing the page at /incidents/abc-123
    # would return 404 because Nginx would look for the file
    # incidents/abc-123/index.html which does not exist.
    # ================================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ================================================================
    # Static assets with content hash in filename (e.g. main-ABC123.js)
    # can be cached aggressively — hash changes on every build
    # ================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Repeat security headers — Nginx does not inherit headers
        # from the server{} block into location{} blocks
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }

    # ================================================================
    # index.html — do not cache because it references hashed assets
    # ================================================================
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";

        # Repeat security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self';
            style-src 'self' 'unsafe-inline';
            connect-src 'self'
                http://localhost:8081
                http://localhost:8082
                ws://localhost:8082
                https://localhost:8081
                https://localhost:8082
                wss://localhost:8082;
            font-src 'self';
            img-src 'self' data:;
            frame-ancestors 'none';
            object-src 'none';
            base-uri 'self';
        " always;
    }

    # ================================================================
    # Hide Nginx version — do not expose infrastructure information
    # ================================================================
    server_tokens off;
}