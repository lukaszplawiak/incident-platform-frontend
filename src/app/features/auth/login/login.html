<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <h1 class="login-title">
        🔴 Incident Platform
      </h1>
      <p class="login-subtitle">Sign in to manage incidents</p>
    </div>

    @if (error()) {
      <div class="login-error" role="alert">
        {{ error() }}
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label class="form-label" for="userId">User ID</label>
        <input
          id="userId"
          type="text"
          class="form-input"
          [class.form-input--error]="hasError('userId', 'required')"
          formControlName="userId"
          placeholder="e.g. user-1"
          autocomplete="username"
          [attr.aria-describedby]="hasError('userId', 'required') ? 'userId-error' : null">

        @if (hasError('userId', 'required')) {
          <span id="userId-error" class="form-error" role="alert">
            User ID is required
          </span>
        }
      </div>

      <div class="form-group">
        <label class="form-label" for="tenantId">Tenant ID</label>
        <input
          id="tenantId"
          type="text"
          class="form-input"
          [class.form-input--error]="hasError('tenantId', 'required')"
          formControlName="tenantId"
          placeholder="e.g. acme-corp"
          autocomplete="organization"
          [attr.aria-describedby]="hasError('tenantId', 'required') ? 'tenantId-error' : null">

        @if (hasError('tenantId', 'required')) {
          <span id="tenantId-error" class="form-error" role="alert">
            Tenant ID is required
          </span>
        }
      </div>

      <button
        type="submit"
        class="login-button"
        [disabled]="loading()">
        @if (loading()) {
          <span>Signing in...</span>
        } @else {
          <span>Sign in</span>
        }
      </button>

    </form>

    <p class="login-note">
      ⚠️ Development mode — using dev token endpoint
    </p>

  </div>
</div>
