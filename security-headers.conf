# ==============================================================
# security-headers.conf — shared security headers for all locations
#
# Included in every location{} block that defines its own add_header.
# Nginx does NOT inherit add_header directives from server{} into
# location{} blocks when the location itself defines any add_header.
# This file solves the inheritance problem by explicit include.
#
# Usage in nginx.conf:
#   location / { include /etc/nginx/security-headers.conf; }
# ==============================================================

# Prevents MIME type sniffing
# Browser will not execute a .txt file as JavaScript
add_header X-Content-Type-Options "nosniff" always;

# Clickjacking protection — duplicates frame-ancestors from CSP
# Fallback for older browsers that do not support CSP frame-ancestors
add_header X-Frame-Options "DENY" always;

# Referrer Policy — browser sends only origin when navigating externally
# Prevents leaking internal URL paths (e.g. /incidents/uuid) to third parties
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions Policy — disables browser APIs not used by this application
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

# Content-Security-Policy
#
# Changes vs previous version:
# - Removed font-src https://fonts.gstatic.com (Google Fonts removed in fix/csp-font-src-sri)
# - Added http://localhost:8081 to connect-src (ingestion-service was missing)
# - Added https variants for all localhost ports
#
# TODO before production deploy:
# - Replace all localhost URLs with production API domains
# - Remove 'unsafe-inline' from style-src (requires nonce-based approach)
# - Enable HSTS in nginx.conf after obtaining SSL certificate
add_header Content-Security-Policy "
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline';
    connect-src 'self'
        http://localhost:8081
        http://localhost:8082
        ws://localhost:8082
        https://localhost:8081
        https://localhost:8082
        wss://localhost:8082;
    font-src 'self';
    img-src 'self' data:;
    frame-ancestors 'none';
    object-src 'none';
    base-uri 'self';
" always;