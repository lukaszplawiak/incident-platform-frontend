##############################################################
# nginx.conf — production configuration for Angular SPA
#
# Usage:
#   ng build --configuration production
#   docker build -t incident-platform-frontend .
#   docker run -p 80:80 incident-platform-frontend
#
# Security headers are defined in security-headers.conf and
# included in every location{} block that defines add_header.
#
# Why include instead of server{} level headers:
#   Nginx does NOT inherit add_header from server{} into location{}
#   blocks when the location itself defines any add_header.
#   Explicit include in each location{} guarantees headers are sent
#   for every response regardless of which location matched.
#
# NOTE: HTTP header CSP takes precedence over meta tag CSP in index.html.
##############################################################

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ================================================================
    # Gzip compression — reduces transfer size for text assets
    # ================================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ================================================================
    # HSTS — enforces HTTPS for 1 year
    # NOTE: Enable only after obtaining a valid SSL certificate.
    # Enabling HSTS on HTTP-only environments locks users out.
    # ================================================================
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ================================================================
    # Hide Nginx version — do not expose infrastructure information
    # ================================================================
    server_tokens off;

    # ================================================================
    # Angular SPA routing
    # All client-side routes (e.g. /incidents/abc-123) are handled
    # by index.html — Nginx must not return 404 for unknown paths.
    # ================================================================
    location / {
        try_files $uri $uri/ /index.html;

        # Security headers — included explicitly because Nginx does not
        # inherit server{} add_header into location{} blocks
        include /etc/nginx/security-headers.conf;
    }

    # ================================================================
    # Static assets — aggressive caching via content-hash filenames
    # Angular build appends hash to filenames (e.g. main-ABC123.js)
    # so cache can be set to 1 year — hash changes on every build
    # ================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Security headers — must be repeated because this location
        # defines its own add_header (Cache-Control above),
        # which disables server{} header inheritance for this block
        include /etc/nginx/security-headers.conf;
    }

    # ================================================================
    # index.html — never cache
    # index.html references hashed asset filenames — if cached,
    # users would load stale JS/CSS after a new deployment
    # ================================================================
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";

        # Security headers — must be repeated, same reason as above
        include /etc/nginx/security-headers.conf;
    }
}